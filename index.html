<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Jaya Berkah Integrated System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F0F4FF;--white:#FFFFFF;--card:#FFFFFF;
  --blue:#3B82F6;--blue2:#2563EB;--blue3:#1D4ED8;--blueSoft:#EFF6FF;--blueBorder:#DBEAFE;
  --orange:#F97316;--green:#22C55E;--red:#EF4444;--yellow:#F59E0B;--purple:#8B5CF6;
  --text:#1E293B;--text2:#475569;--text3:#94A3B8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow2:0 4px 16px rgba(59,130,246,.15);
}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
input,select,textarea,button{font-family:'Inter','Segoe UI',sans-serif;}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,var(--blue2) 0%,var(--blue3) 100%);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(37,99,235,.3);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.jb-logo{width:36px;height:36px;flex-shrink:0;}
.topbar-title{color:#fff;}
.topbar-title strong{font-size:14px;font-weight:800;display:block;letter-spacing:.2px;}
.topbar-title span{font-size:9px;letter-spacing:2px;opacity:.8;font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.user-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px 4px 6px;display:flex;align-items:center;gap:6px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.3);color:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;}
.user-name{color:#fff;font-size:11px;font-weight:600;}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:11px;font-weight:600;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E8F0;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,4px);box-shadow:0 -2px 12px rgba(0,0,0,.06);}
.nav-item{flex:1;background:none;border:none;cursor:pointer;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;}
.nav-icon{font-size:19px;line-height:1;}
.nav-label{font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.2px;}
.nav-item.active .nav-label{color:var(--blue2);font-weight:700;}
.nav-indicator{width:20px;height:3px;background:var(--blue2);border-radius:2px;margin-top:1px;}

/* CONTENT */
.content{padding:16px 16px 90px;max-width:600px;margin:0 auto;width:100%;}

/* CARDS */
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.card-blue{background:linear-gradient(135deg,var(--blue2) 0%,var(--blue) 100%);border-radius:16px;padding:16px;box-shadow:var(--shadow2);margin-bottom:12px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kpi{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--shadow);}
.kpi-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px;}
.kpi-label{color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.kpi-val{font-size:20px;font-weight:800;line-height:1.1;}
.kpi-sub{color:var(--text3);font-size:11px;margin-top:2px;}

/* SECTION HEADER */
.sec{margin-bottom:14px;}
.sec-row{display:flex;align-items:center;gap:8px;}
.sec-dot{width:4px;height:20px;background:var(--blue2);border-radius:2px;}
.sec-title{color:var(--text);font-weight:700;font-size:16px;}
.sec-sub{color:var(--text3);font-size:12px;margin-top:2px;padding-left:12px;}

/* FORM */
.field{margin-bottom:14px;}
.field-label{color:var(--text2);font-size:12px;font-weight:600;margin-bottom:6px;display:block;}
.req{color:var(--blue2);}
.inp{width:100%;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:10px;padding:13px 14px;color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;appearance:none;transition:border .2s;}
.inp:focus{border-color:var(--blue2);background:#fff;}
textarea.inp{resize:none;}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* BUTTONS */
.btn{border:none;border-radius:12px;padding:13px 20px;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.2px;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.97);}
.btn-blue{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3);}
.btn-full{width:100%;}
.btn-ghost{background:#F1F5F9;color:var(--text2);border:1.5px solid #E2E8F0;}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:#FEE2E2;color:var(--red);border:1px solid #FECACA;}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:9px;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:9px;font-size:15px;}

/* BADGE */
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.badge-blue{background:#DBEAFE;color:var(--blue2);}
.badge-green{background:#DCFCE7;color:#15803D;}
.badge-red{background:#FEE2E2;color:#DC2626;}
.badge-yellow{background:#FEF3C7;color:#B45309;}
.badge-gray{background:#F1F5F9;color:var(--text2);}
.badge-masuk{background:#DCFCE7;color:#15803D;}
.badge-keluar{background:#FEF3C7;color:#B45309;}

/* TOAST */
.toast{background:#DCFCE7;border:1.5px solid #86EFAC;border-radius:12px;padding:12px 16px;color:#15803D;font-weight:700;font-size:13px;margin-bottom:14px;display:none;align-items:center;gap:8px;}
.toast.show{display:flex;}

/* CONVERT BOX */
.conv-box{background:var(--blueSoft);border:1.5px solid var(--blueBorder);border-radius:14px;padding:14px;margin-bottom:12px;}
.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.conv-cell{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow);}
.conv-val{font-size:24px;font-weight:800;}
.conv-unit{color:var(--text3);font-size:10px;margin-top:3px;font-weight:600;letter-spacing:.5px;}
.conv-note{color:var(--text3);font-size:11px;margin-top:8px;text-align:center;}

/* COST BOX */
.cost-box{background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:14px;padding:14px;margin-bottom:12px;}
.cost-head{color:var(--orange);font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:10px;}
.cost-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cost-label{color:var(--text2);font-size:13px;}
.cost-val{color:var(--text);font-weight:600;font-size:13px;}
.cost-divider{border:none;border-top:1.5px solid #FED7AA;margin:8px 0;}
.cost-total-label{color:var(--text);font-size:14px;font-weight:700;}
.cost-total-val{color:var(--orange);font-size:20px;font-weight:800;}

/* MESIN CARDS */
.mesin-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px;margin-bottom:10px;}
.mesin-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mesin-name{color:var(--text);font-weight:700;font-size:15px;}
.mesin-type{color:var(--text3);font-size:11px;margin-top:2px;}
.mesin-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.mesin-stat{background:#F8FAFC;border-radius:9px;padding:10px;text-align:center;}
.mesin-stat-label{color:var(--text3);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.mesin-stat-val{color:var(--text);font-weight:700;font-size:13px;}
.mesin-actions{display:flex;gap:6px;margin-top:10px;}

/* WORKER/GAJI CARDS */
.gaji-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px;margin-bottom:10px;}
.gaji-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.gaji-name{color:var(--text);font-weight:700;font-size:15px;}
.gaji-sub{color:var(--text3);font-size:11px;margin-top:2px;}
.gaji-detail{background:#F8FAFC;border-radius:10px;padding:12px;margin-bottom:12px;}
.gaji-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.gaji-row:last-child{margin-bottom:0;}
.gaji-key{color:var(--text2);font-size:12px;}
.gaji-val{color:var(--text);font-weight:600;font-size:12px;}
.gaji-total{background:linear-gradient(135deg,#FFF7ED,#FFEDD5);border:1.5px solid #FED7AA;border-radius:10px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.gaji-total-label{color:var(--text2);font-size:13px;font-weight:600;}
.gaji-total-val{color:var(--orange);font-size:20px;font-weight:800;}
.status-row{display:flex;gap:8px;}
.status-btn{flex:1;border:1.5px solid #E2E8F0;border-radius:10px;padding:10px;cursor:pointer;font-weight:700;font-size:12px;background:#F8FAFC;color:var(--text2);transition:.15s;}
.status-btn.lunas{background:#DCFCE7;border-color:#86EFAC;color:#15803D;}
.status-btn.dp{background:#DBEAFE;border-color:#93C5FD;color:var(--blue2);}
.status-btn.belum{background:#FEE2E2;border-color:#FECACA;color:#DC2626;}

/* LOG CARDS */
.log-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px;margin-bottom:10px;}
.log-head{display:flex;justify-content:space-between;align-items:flex-start;}
.log-title{color:var(--text);font-weight:700;font-size:14px;}
.log-sub{color:var(--text3);font-size:11px;margin-top:2px;}
.log-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.log-tag{background:#F1F5F9;border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text2);font-weight:500;}

/* HISTORY */
.hist-card{background:#fff;border-left:3px solid var(--blue2);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
.hist-time{color:var(--text3);font-size:10px;font-weight:600;margin-bottom:4px;}
.hist-title{color:var(--text);font-weight:600;font-size:13px;}
.hist-detail{color:var(--text2);font-size:12px;margin-top:2px;}

/* HPP */
.hpp-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px;margin-bottom:10px;}
.hpp-name{color:var(--text);font-weight:700;font-size:13px;margin-bottom:10px;}
.hpp-cols{display:flex;gap:8px;}
.hpp-col{flex:1;background:#F8FAFC;border-radius:9px;padding:10px;text-align:center;}
.hpp-col.hi{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border:1px solid #BFDBFE;}
.hpp-col-label{color:var(--text3);font-size:9px;font-weight:600;letter-spacing:.3px;margin-bottom:4px;}
.hpp-col-val{color:var(--text);font-weight:700;font-size:12px;}
.hpp-col.hi .hpp-col-val{color:var(--blue2);}

/* TABS */
.tabs{display:flex;background:#F1F5F9;border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
.tab{flex:1;border:none;border-radius:9px;padding:9px;cursor:pointer;font-weight:600;font-size:12px;background:transparent;color:var(--text3);transition:.2s;}
.tab.active{background:#fff;color:var(--blue2);box-shadow:var(--shadow);}

/* FILTER */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{border:1.5px solid #E2E8F0;border-radius:20px;padding:6px 14px;cursor:pointer;font-weight:600;font-size:12px;background:#fff;color:var(--text2);white-space:nowrap;transition:.2s;}
.filter-pill.active{background:var(--blue2);border-color:var(--blue2);color:#fff;}

/* LOGIN */
.login-wrap{min-height:100vh;background:linear-gradient(160deg,#1D4ED8 0%,#3B82F6 40%,#60A5FA 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-logo-area{text-align:center;margin-bottom:32px;}
.login-logo-box{width:80px;height:80px;background:rgba(255,255,255,.15);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:2px solid rgba(255,255,255,.3);}
.login-title{color:#fff;font-size:26px;font-weight:900;letter-spacing:-.5px;}
.login-sub{color:rgba(255,255,255,.7);font-size:12px;margin-top:4px;font-weight:500;}
.login-card{width:100%;max-width:400px;background:#fff;border-radius:24px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-card-title{color:var(--text);font-weight:700;font-size:16px;margin-bottom:20px;}
.login-err{background:#FEE2E2;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;color:#DC2626;font-size:13px;font-weight:600;margin-bottom:14px;display:none;}
.login-err.show{display:block;}
.demo-section{margin-top:20px;padding-top:16px;border-top:1px solid #F1F5F9;}
.demo-label{color:var(--text3);font-size:11px;font-weight:600;text-align:center;margin-bottom:10px;letter-spacing:.5px;}
.demo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.demo-btn{background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:12px;padding:10px 6px;cursor:pointer;text-align:center;transition:.2s;}
.demo-btn:active{background:#EFF6FF;border-color:var(--blue2);}
.demo-av{width:30px;height:30px;border-radius:50%;color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;}
.demo-u{color:var(--text);font-size:10px;font-weight:700;}
.demo-r{color:var(--text3);font-size:9px;}
.pw-wrap{position:relative;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px;}

/* CHART BARS */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height .5s;}
.bar-label{color:var(--text3);font-size:9px;text-align:center;font-weight:500;}
.bar-val{color:var(--text2);font-size:8px;font-weight:700;}

/* ARAH */
.arah-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.arah-btn{border:1.5px solid #E2E8F0;border-radius:10px;padding:12px;cursor:pointer;font-weight:700;font-size:13px;background:#F8FAFC;color:var(--text2);transition:.2s;}
.arah-btn.masuk{background:#DCFCE7;border-color:#86EFAC;color:#15803D;}
.arah-btn.keluar{background:#FEF3C7;border-color:#FCD34D;color:#92400E;}

/* TOTAL BOX */
.total-box{background:linear-gradient(135deg,var(--blue2),var(--blue));border-radius:16px;padding:18px;text-align:center;margin-top:12px;box-shadow:var(--shadow2);}
.total-box-label{color:rgba(255,255,255,.7);font-size:12px;font-weight:600;margin-bottom:4px;}
.total-box-val{color:#fff;font-size:28px;font-weight:900;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 20px;}
.modal-title{color:var(--text);font-weight:700;font-size:16px;margin-bottom:16px;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:14px;font-weight:600;}
.empty-sub{font-size:12px;margin-top:4px;}
</style>
</head>
<body>

<!-- JB SVG LOGO -->
<svg style="display:none" id="jbsvg">
  <symbol id="logo-jb" viewBox="0 0 100 100">
    <rect width="100" height="100" rx="18" fill="#2563EB"/>
    <text x="12" y="72" font-family="Arial Black,sans-serif" font-weight="900" font-size="62" fill="white">JB</text>
    <polygon points="52,8 62,8 62,18 52,18" fill="#EF4444" opacity=".9"/>
    <polygon points="58,4 68,4 68,14 58,14" fill="#94A3B8" opacity=".9"/>
  </symbol>
</svg>

<!-- LOGIN -->
<div id="loginWrap" class="login-wrap">
  <div class="login-logo-area">
    <div class="login-logo-box">
      <svg width="56" height="56" viewBox="0 0 100 100">
        <text x="8" y="72" font-family="Arial Black,sans-serif" font-weight="900" font-size="68" fill="white">JB</text>
        <polygon points="52,6 64,6 64,18 52,18" fill="#EF4444"/>
        <polygon points="60,2 72,2 72,14 60,14" fill="#94A3B8"/>
      </svg>
    </div>
    <div class="login-title">JAYA BERKAH</div>
    <div class="login-sub">Integrated System · UD. Jaya Berkah, Kudus</div>
  </div>
  <div class="login-card">
    <div class="login-card-title">Masuk ke Sistem</div>
    <div class="field">
      <label class="field-label">Username <span class="req">*</span></label>
      <input id="lu" class="inp" placeholder="Masukkan username" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="field">
      <label class="field-label">Password <span class="req">*</span></label>
      <div class="pw-wrap">
        <input id="lp" type="password" class="inp" placeholder="Masukkan password" style="padding-right:46px" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="pw-eye" onclick="document.getElementById('lp').type=document.getElementById('lp').type==='password'?'text':'password'"></button>
      </div>
    </div>
    <div id="lerr" class="login-err">⚠ Username atau password salah</div>
    <button class="btn btn-blue btn-full" onclick="doLogin()">Masuk →</button>
    <div class="demo-section">
      <div class="demo-label">AKUN DEMO — TAP UNTUK PILIH</div>
      <div class="demo-grid">
        <div class="demo-btn" onclick="fillD('owner','jaya2025')"><div class="demo-av" style="background:#2563EB">B</div><div class="demo-u">owner</div><div class="demo-r"> Owner</div></div>
        <div class="demo-btn" onclick="fillD('admin','admin123')"><div class="demo-av" style="background:#7C3AED">A</div><div class="demo-u">admin</div><div class="demo-r"> Admin</div></div>
        <div class="demo-btn" onclick="fillD('paving','paving123')"><div class="demo-av" style="background:#059669">P</div><div class="demo-u">paving</div><div class="demo-r"> Paving</div></div>
        <div class="demo-btn" onclick="fillD('buis','buis123')"><div class="demo-av" style="background:#D97706">U</div><div class="demo-u">buis</div><div class="demo-r"> Buis</div></div>
        <div class="demo-btn" onclick="fillD('security','sec123')"><div class="demo-av" style="background:#475569">S</div><div class="demo-u">security</div><div class="demo-r"> Gate</div></div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appWrap" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="topbar">
    <div class="topbar-left">
      <svg class="jb-logo" viewBox="0 0 100 100">
        <rect width="100" height="100" rx="16" fill="rgba(255,255,255,.15)"/>
        <text x="6" y="72" font-family="Arial Black,sans-serif" font-weight="900" font-size="64" fill="white">JB</text>
        <polygon points="50,6 62,6 62,18 50,18" fill="#EF4444"/>
        <polygon points="58,2 70,2 70,14 58,14" fill="#94A3B8"/>
      </svg>
      <div class="topbar-title"><strong>JAYA BERKAH</strong><span>INTEGRATED SYSTEM</span></div>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="topAv">B</div>
        <div class="user-name" id="topName">-</div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </div>
  <div class="content" id="mc"></div>
  <div class="bottom-nav" id="bn"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════

function doLogin(){
  const u=document.getElementById("lu").value.trim(),p=document.getElementById("lp").value.trim();

  if(!user){document.getElementById("lerr").classList.add("show");return;}
  document.getElementById("lerr").classList.remove("show");
  CU=user;
  document.getElementById("loginWrap").style.display="none";
  document.getElementById("appWrap").style.display="flex";
  document.getElementById("topAv").textContent=user.av;
  document.getElementById("topAv").style.background=user.color;
  document.getElementById("topName").textContent=user.name;
  buildNav();
  const def={owner:"dashboard",admin:"gaji",paving:"input_paving",buis:"input_buis",security:"security"};
  go(def[user.role]);
}

  bn.style.display="flex";
  bn.innerHTML=items.map(([k,ic,l])=>`
    <button class="nav-item${NAV===k?" active":""}" onclick="go('${k}')">

function saveMesinBaru(){

function saveEditMesin(id){

function toggleMesin(id){mesinList=mesinList.map(m=>m.id===id?{...m,aktif:!m.aktif}:m);addLog("Toggle Mesin",`ID: ${id}`,"mesin");go("mesin");}

  </div>`;

function updPavCalc(){
  const pid=document.getElementById("pPid")?.value;
  const mesinId=document.getElementById("pMesin")?.value;
  const jml=+document.getElementById("pJml")?.value||0;
  const prod=PAVING.find(p=>p.id===pid);
  const mesin=mesinList.find(m=>m.id===mesinId);
  if(jml>0){
    document.getElementById("pConv").style.display="block";
    document.getElementById("pBijiD").textContent=N(jml);
    if(prod){
      document.getElementById("pM2D").textContent=(prod.m2*jml).toFixed(2);
      document.getElementById("pM2Note").textContent=`1 biji = ${prod.m2} m² · ${prod.nama} · ${N(Math.round(1/prod.m2))} biji/m²`;
      document.getElementById("pM2Note").style.color="var(--text3)";
    } else {
      document.getElementById("pM2D").textContent="—";
      document.getElementById("pM2Note").textContent="← Pilih produk untuk lihat m²";
      document.getElementById("pM2Note").style.color="var(--yellow)";
    }
  } else {
    document.getElementById("pConv").style.display="none";
  }
  if(!prod||!mesin||!jml){document.getElementById("pCost").style.display="none";return;}
  document.getElementById("pCost").style.display="block";
  const ct=mesin.tarif*jml;
  const cb=calcCostPav(pid,jml);
  document.getElementById("pCT").textContent=Rp(ct);
  document.getElementById("pCB").textContent=cb?Rp(cb):"Belum ada formula";
  document.getElementById("pCB").style.color=cb?"var(--text)":"var(--text3)";
  document.getElementById("pTotal").textContent=Rp(ct+(cb||0));
}
function savePaving(){
  const pid=document.getElementById("pPid").value;
  const mesinId=document.getElementById("pMesin").value;
  const jml=+document.getElementById("pJml").value;
  const date=document.getElementById("pDate").value;
  const cat=document.getElementById("pCat").value;
  if(!pid||!mesinId||!jml){alert("Isi mesin, produk, dan jumlah dulu");return;}
  const prod=PAVING.find(p=>p.id===pid);
  const mesin=mesinList.find(m=>m.id===mesinId);
  const cb=calcCostPav(pid,jml);
  const ct=mesin.tarif*jml;
  prodPav.unshift({id:Date.now(),date,pid,nama:prod.nama,mesinId,mesinNama:mesin.nama,jml,m2:+(prod.m2*jml).toFixed(2),tenaga:mesin.tarif,total:ct+(cb||0),cat});
  addLog("Input Produksi Paving",`${prod.nama} — ${mesin.nama} — ${N(jml)} biji (${(prod.m2*jml).toFixed(1)} m²) — ${Rp(ct+(cb||0))}`,"prod");
  const t=document.getElementById("toastP");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3500);
  document.getElementById("pPid").value="";document.getElementById("pMesin").value="";
  document.getElementById("pJml").value="";document.getElementById("pCat").value="";
  document.getElementById("pConv").style.display="none";document.getElementById("pCost").style.display="none";
}

function pgRiwayat(type){
  rwType=type;
  const data=type==="paving"?prodPav:prodBuis;
  const filt=rwFilter?data.filter(p=>p.date===rwFilter):data;
  const tB=filt.reduce((a,b)=>a+b.jml,0);
  const tM2=type==="paving"?filt.reduce((a,b)=>a+(b.m2||0),0):0;
  const tC=filt.reduce((a,b)=>a+b.total,0);
  return`
  <div class="sec"><div class="sec-row"><div class="sec-dot"></div><div class="sec-title">Riwayat ${type==="paving"?"Paving":"Buis Beton"}</div></div></div>
  <div class="field"><input type="date" id="rwF" class="inp" value="${rwFilter}" onchange="rwFilter=this.value;pgRiwayatRefresh('${type}')"/>
    ${rwFilter?`<button class="btn btn-ghost btn-sm btn-full" style="margin-top:8px" onclick="rwFilter='';go('laporan_${type}')">Reset Filter</button>`:""}</div>
  <div class="kpi-grid" style="grid-template-columns:${type==="paving"?"1fr 1fr 1fr":"1fr 1fr"}">
    <div class="kpi"><div class="kpi-label">Total Biji</div><div class="kpi-val" style="color:var(--blue2)">${N(tB)}</div></div>
    ${type==="paving"?`<div class="kpi"><div class="kpi-label">Total m²</div><div class="kpi-val" style="color:var(--green)">${tM2.toFixed(1)}</div></div>`:""}
    <div class="kpi"><div class="kpi-label">Total Cost</div><div class="kpi-val" style="color:var(--orange);font-size:14px">${Rp(tC)}</div></div>
  </div>
  ${filt.length?filt.map(p=>`
    <div class="card" style="margin-bottom:10px;padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div style="flex:1;margin-right:10px"><div style="font-weight:700;font-size:14px">${p.nama}</div><div style="color:var(--text3);font-size:11px;margin-top:2px">${p.mesinNama}</div></div>
        <div style="text-align:right"><div style="color:var(--text3);font-size:11px">${fmtD(p.date)}</div></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <span style="color:var(--text2);font-size:12px">Produksi: <b style="color:var(--blue2)">${N(p.jml)} biji</b></span>
        ${type==="paving"?`<span style="color:var(--text2);font-size:12px">Luas: <b style="color:var(--green)">${(p.m2||0).toFixed(2)} m²</b></span>`:""}
        <span style="color:var(--text2);font-size:12px">Cost: <b style="color:var(--orange)">${Rp(p.total)}</b></span>
      </div>
      ${p.cat?`<div style="color:var(--text3);font-size:11px;margin-top:6px;font-style:italic"> ${p.cat}</div>`:""}
    </div>`).join(""):`<div class="empty"><div class="empty-icon"></div><div class="empty-text">Belum ada data</div></div>`}`;
}

// ══════════════════════════════════════════════════════
function pgGaji(){
  // Hitung gaji per mesin dari data produksi
  const gajiMesin=mesinList.map(m=>{
    const prod=[...prodPav,...prodBuis].filter(p=>p.mesinId===m.id);
    const totalBiji=prod.reduce((a,b)=>a+b.jml,0);
    const totalGaji=prod.reduce((a,b)=>a+b.total,0);
    return{...m,totalBiji,totalGaji,status:m.gajiStatus||"belum",met:m.gajiMet||"tunai"};
  }).filter(m=>m.totalBiji>0);

  const total=gajiMesin.reduce((a,b)=>a+b.totalGaji,0);
  const lunas=gajiMesin.filter(m=>m.status==="lunas").reduce((a,b)=>a+b.totalGaji,0);
  const belum=gajiMesin.filter(m=>m.status!=="lunas").reduce((a,b)=>a+b.totalGaji,0);
  const filtered=gajiFilter==="semua"?gajiMesin:gajiMesin.filter(m=>m.status===gajiFilter);

  return`
  <div class="sec"><div class="sec-row"><div class="sec-dot"></div><div class="sec-title">Penggajian per Mesin</div></div><div class="sec-sub">Sabtu, ${new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"})}</div></div>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-icon-wrap" style="background:#FFF7ED">&#128184;</div><div class="kpi-label">Total Gaji</div><div class="kpi-val" style="color:var(--orange);font-size:16px">${Rp(total)}</div></div>
    <div class="kpi"><div class="kpi-icon-wrap" style="background:#F0FDF4">✅</div><div class="kpi-label">Sudah Lunas</div><div class="kpi-val" style="color:var(--green);font-size:16px">${Rp(lunas)}</div></div>
    <div class="kpi"><div class="kpi-icon-wrap" style="background:#FEF2F2">⏳</div><div class="kpi-label">Belum Bayar</div><div class="kpi-val" style="color:var(--red);font-size:16px">${Rp(belum)}</div></div>
    <div class="kpi"><div class="kpi-icon-wrap" style="background:#EFF6FF">⚙️</div><div class="kpi-label">Jumlah Mesin</div><div class="kpi-val" style="color:var(--blue2)">${gajiMesin.length}</div></div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="btn btn-green" style="flex:1;padding:11px" onclick="allMesinLunas()">✅ Semua Lunas</button>
    <button class="btn btn-blue" style="flex:1;padding:11px" id="btnCopy" onclick="copyGaji()"> Copy Accurate</button>
  </div>
  <div class="filter-row">
    ${["semua","belum","dp","lunas"].map(f=>`<button class="filter-pill${gajiFilter===f?" active":""}" onclick="gajiFilter='${f}';go('gaji')">${{semua:"Semua",belum:"Belum",dp:"DP",lunas:"Lunas"}[f]}</button>`).join("")}
  </div>
  ${filtered.length?filtered.map(m=>`
    <div class="gaji-card">
      <div class="gaji-head">
        <div><div class="gaji-name">${m.nama}</div><div class="gaji-sub"> ${m.operator} · ${m.tipe}</div></div>
        ${badge(m.status)}
      </div>
      <div class="gaji-detail">
        <div class="gaji-row"><span class="gaji-key">Total Produksi</span><span class="gaji-val">${N(m.totalBiji)} biji</span></div>

    return`${m.nama}\t${m.operator}\t${N(biji)} biji\t${Rp(m.tarif)}/biji\t${Rp(total)}\t${m.gajiStatus||"belum"}`;

\

${rows}`;

async function syncToGS(type,payload){
  if(!gsConfig.aktif||!gsConfig.url)return;
  try{
    // Apps Script requires form data or URL params for cross-origin POST
    const params=new URLSearchParams({type,...Object.fromEntries(
      Object.entries(payload).map(([k,v])=>[k,String(v)])
    )});
    // Try GET with params first (works with no-cors)
    const url=gsConfig.url+'?'+params.toString();
    await fetch(url,{method:'GET',mode:'no-cors'});
  }catch(e){console.log('GS sync error:',e);}
}

</script>
