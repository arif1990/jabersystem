<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Jaya Berkah Integrated System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F0F4FF;--white:#FFFFFF;--card:#FFFFFF;
  --blue:#3B82F6;--blue2:#2563EB;--blue3:#1D4ED8;--blueSoft:#EFF6FF;--blueBorder:#DBEAFE;
  --orange:#F97316;--green:#22C55E;--red:#EF4444;--yellow:#F59E0B;--purple:#8B5CF6;
  --text:#1E293B;--text2:#475569;--text3:#94A3B8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow2:0 4px 16px rgba(59,130,246,.15);
}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
input,select,textarea,button{font-family:'Inter','Segoe UI',sans-serif;}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,var(--blue2) 0%,var(--blue3) 100%);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(37,99,235,.3);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.jb-logo{width:36px;height:36px;flex-shrink:0;}
.topbar-title{color:#fff;}
.topbar-title strong{font-size:14px;font-weight:800;display:block;letter-spacing:.2px;}
.topbar-title span{font-size:9px;letter-spacing:2px;opacity:.8;font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.user-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px 4px 6px;display:flex;align-items:center;gap:6px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.3);color:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;}
.user-name{color:#fff;font-size:11px;font-weight:600;}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:11px;font-weight:600;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E8F0;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,4px);box-shadow:0 -2px 12px rgba(0,0,0,.06);}
.nav-item{flex:1;background:none;border:none;cursor:pointer;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;}
.nav-icon{font-size:19px;line-height:1;}
.nav-label{font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.2px;}
.nav-item.active .nav-label{color:var(--blue2);font-weight:700;}
.nav-indicator{width:20px;height:3px;background:var(--blue2);border-radius:2px;margin-top:1px;}

/* CONTENT */
.content{padding:16px 16px 90px;max-width:600px;margin:0 auto;width:100%;}

/* CARDS */
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.card-blue{background:linear-gradient(135deg,var(--blue2) 0%,var(--blue) 100%);border-radius:16px;padding:16px;box-shadow:var(--shadow2);margin-bottom:12px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kpi{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--shadow);}
.kpi-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px;}
.kpi-label{color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.kpi-val{font-size:20px;font-weight:800;line-height:1.1;}
.kpi-sub{color:var(--text3);font-size:11px;margin-top:2px;}

/* SECTION HEADER */
.sec{margin-bottom:14px;}
.sec-row{display:flex;align-items:center;gap:8px;}
.sec-dot{width:4px;height:20px;background:var(--blue2);border-radius:2px;}
.sec-title{color:var(--text);font-weight:700;font-size:16px;}
.sec-sub{color:var(--text3);font-size:12px;margin-top:2px;padding-left:12px;}

/* FORM */
.field{margin-bottom:14px;}
.field-label{color:var(--text2);font-size:12px;font-weight:600;margin-bottom:6px;display:block;}
.req{color:var(--blue2);}
.inp{width:100%;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:10px;padding:13px 14px;color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;appearance:none;transition:border .2s;}
.inp:focus{border-color:var(--blue2);background:#fff;}
textarea.inp{resize:none;}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* BUTTONS */
.btn{border:none;border-radius:12px;padding:13px 20px;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.2px;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.97);}
.btn-blue{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3);}
.btn-full{width:100%;}
.btn-ghost{background:#F1F5F9;color:var(--text2);border:1.5px solid #E2E8F0;}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:#FEE2E2;color:var(--red);border:1px solid #FECACA;}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:9px;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:9px;font-size:15px;}

/* BADGE */
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.badge-blue{background:#DBEAFE;color:var(--blue2);}
.badge-green{background:#DCFCE7;color:#15803D;}
.badge-red{background:#FEE2E2;color:#DC2626;}
.badge-yellow{background:#FEF3C7;color:#B45309;}
.badge-gray{background:#F1F5F9;color:var(--text2);}
.badge-masuk{background:#DCFCE7;color:#15803D;}
.badge-keluar{background:#FEF3C7;color:#B45309;}

/* TOAST */
.toast{background:#DCFCE7;border:1.5px solid #86EFAC;border-radius:12px;padding:12px 16px;color:#15803D;font-weight:700;font-size:13px;margin-bottom:14px;display:none;align-items:center;gap:8px;}
.toast.show{display:flex;}

/* CONVERT BOX */
.conv-box{background:var(--blueSoft);border:1.5px solid var(--blueBorder);border-radius:14px;padding:14px;margin-bottom:12px;}
.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.conv-cell{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow);}
.conv-val{font-size:24px;font-weight:800;}
.conv-unit{color:var(--text3);font-size:10px;margin-top:3px;font-weight:600;letter-spacing:.5px;}
.conv-note{color:var(--text3);font-size:11px;margin-top:8px;text-align:center;}

/* COST BOX */
.cost-box{background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:14px;padding:14px;margin-bottom:12px;}
.cost-head{color:var(--orange);font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:10px;}
.cost-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cost-label{color:var(--text2);font-size:13px;}
.cost-val{color:var(--text);font-weight:600;font-size:13px;}
.cost-divider{border:none;border-top:1.5px solid #FED7AA;margin:8px 0;}
.cost-total-label{color:var(--text);font-size:14px;font-weight:700;}
.cost-total-val{color:var(--orange);font-size:20px;font-weight:800;}

/* MESIN CARDS */
.mesin-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px;margin-bottom:10px;}
.mesin-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mesin-name{color:var(--text);font-weight:700;font-size:15px;}
.mesin-type{color:var(--text3);font-size:11px;margin-top:2px;}
.mesin-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.mesin-stat{background:#F8FAFC;border-radius:9px;padding:10px;text-align:center;}
.mesin-stat-label{color:var(--text3);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.mesin-stat-val{color:var(--text);font-weight:700;font-size:13px;}
.mesin-actions{display:flex;gap:6px;margin-top:10px;}

/* WORKER/GAJI CARDS */
.gaji-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px;margin-bottom:10px;}
.gaji-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.gaji-name{color:var(--text);font-weight:700;font-size:15px;}
.gaji-sub{color:var(--text3);font-size:11px;margin-top:2px;}
.gaji-detail{background:#F8FAFC;border-radius:10px;padding:12px;margin-bottom:12px;}
.gaji-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.gaji-row:last-child{margin-bottom:0;}
.gaji-key{color:var(--text2);font-size:12px;}
.gaji-val{color:var(--text);font-weight:600;font-size:12px;}
.gaji-total{background:linear-gradient(135deg,#FFF7ED,#FFEDD5);border:1.5px solid #FED7AA;border-radius:10px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.gaji-total-label{color:var(--text2);font-size:13px;font-weight:600;}
.gaji-total-val{color:var(--orange);font-size:20px;font-weight:800;}
.status-row{display:flex;gap:8px;}
.status-btn{flex:1;border:1.5px solid #E2E8F0;border-radius:10px;padding:10px;cursor:pointer;font-weight:700;font-size:12px;background:#F8FAFC;color:var(--text2);transition:.15s;}
.status-btn.lunas{background:#DCFCE7;border-color:#86EFAC;color:#15803D;}
.status-btn.dp{background:#DBEAFE;border-color:#93C5FD;color:var(--blue2);}
.status-btn.belum{background:#FEE2E2;border-color:#FECACA;color:#DC2626;}

/* LOG CARDS */
.log-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px;margin-bottom:10px;}
.log-head{display:flex;justify-content:space-between;align-items:flex-start;}
.log-title{color:var(--text);font-weight:700;font-size:14px;}
.log-sub{color:var(--text3);font-size:11px;margin-top:2px;}
.log-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.log-tag{background:#F1F5F9;border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text2);font-weight:500;}

/* HISTORY */
.hist-card{background:#fff;border-left:3px solid var(--blue2);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
.hist-time{color:var(--text3);font-size:10px;font-weight:600;margin-bottom:4px;}
.hist-title{color:var(--text);font-weight:600;font-size:13px;}
.hist-detail{color:var(--text2);font-size:12px;margin-top:2px;}

/* HPP */
.hpp-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px;margin-bottom:10px;}
.hpp-name{color:var(--text);font-weight:700;font-size:13px;margin-bottom:10px;}
.hpp-cols{display:flex;gap:8px;}
.hpp-col{flex:1;background:#F8FAFC;border-radius:9px;padding:10px;text-align:center;}
.hpp-col.hi{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border:1px solid #BFDBFE;}
.hpp-col-label{color:var(--text3);font-size:9px;font-weight:600;letter-spacing:.3px;margin-bottom:4px;}
.hpp-col-val{color:var(--text);font-weight:700;font-size:12px;}
.hpp-col.hi .hpp-col-val{color:var(--blue2);}

/* TABS */
.tabs{display:flex;background:#F1F5F9;border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
.tab{flex:1;border:none;border-radius:9px;padding:9px;cursor:pointer;font-weight:600;font-size:12px;background:transparent;color:var(--text3);transition:.2s;}
.tab.active{background:#fff;color:var(--blue2);box-shadow:var(--shadow);}

/* FILTER */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{border:1.5px solid #E2E8F0;border-radius:20px;padding:6px 14px;cursor:pointer;font-weight:600;font-size:12px;background:#fff;color:var(--text2);white-space:nowrap;transition:.2s;}
.filter-pill.active{background:var(--blue2);border-color:var(--blue2);color:#fff;}

/* LOGIN */
.login-wrap{min-height:100vh;background:linear-gradient(160deg,#1D4ED8 0%,#3B82F6 40%,#60A5FA 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-logo-area{text-align:center;margin-bottom:32px;}
.login-logo-box{width:80px;height:80px;background:rgba(255,255,255,.15);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:2px solid rgba(255,255,255,.3);}
.login-title{color:#fff;font-size:26px;font-weight:900;letter-spacing:-.5px;}
.login-sub{color:rgba(255,255,255,.7);font-size:12px;margin-top:4px;font-weight:500;}
.login-card{width:100%;max-width:400px;background:#fff;border-radius:24px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-card-title{color:var(--text);font-weight:700;font-size:16px;margin-bottom:20px;}
.login-err{background:#FEE2E2;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;color:#DC2626;font-size:13px;font-weight:600;margin-bottom:14px;display:none;}
.login-err.show{display:block;}
.demo-section{margin-top:20px;padding-top:16px;border-top:1px solid #F1F5F9;}
.demo-label{color:var(--text3);font-size:11px;font-weight:600;text-align:center;margin-bottom:10px;letter-spacing:.5px;}
.demo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.demo-btn{background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:12px;padding:10px 6px;cursor:pointer;text-align:center;transition:.2s;}
.demo-btn:active{background:#EFF6FF;border-color:var(--blue2);}
.demo-av{width:30px;height:30px;border-radius:50%;color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;}
.demo-u{color:var(--text);font-size:10px;font-weight:700;}
.demo-r{color:var(--text3);font-size:9px;}
.pw-wrap{position:relative;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px;}

/* CHART BARS */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height .5s;}
.bar-label{color:var(--text3);font-size:9px;text-align:center;font-weight:500;}
.bar-val{color:var(--text2);font-size:8px;font-weight:700;}

/* ARAH */
.arah-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.arah-btn{border:1.5px solid #E2E8F0;border-radius:10px;padding:12px;cursor:pointer;font-weight:700;font-size:13px;background:#F8FAFC;color:var(--text2);transition:.2s;}
.arah-btn.masuk{background:#DCFCE7;border-color:#86EFAC;color:#15803D;}
.arah-btn.keluar{background:#FEF3C7;border-color:#FCD34D;color:#92400E;}

/* TOTAL BOX */
.total-box{background:linear-gradient(135deg,var(--blue2),var(--blue));border-radius:16px;padding:18px;text-align:center;margin-top:12px;box-shadow:var(--shadow2);}
.total-box-label{color:rgba(255,255,255,.7);font-size:12px;font-weight:600;margin-bottom:4px;}
.total-box-val{color:#fff;font-size:28px;font-weight:900;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 20px;}
.modal-title{color:var(--text);font-weight:700;font-size:16px;margin-bottom:16px;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:14px;font-weight:600;}
.empty-sub{font-size:12px;margin-top:4px;}
</style>
</head>
<body>

<!-- JB SVG LOGO -->
<svg style="display:none" id="jbsvg">
  <symbol id="logo-jb" viewBox="0 0 100 100">
    <rect width="100" height="100" rx="18" fill="#2563EB"/>
    <text x="12" y="72" font-family="Arial Black,sans-serif" font-weight="900" font-size="62" fill="white">JB</text>
    <polygon points="52,8 62,8 62,18 52,18" fill="#EF4444" opacity=".9"/>
    <polygon points="58,4 68,4 68,14 58,14" fill="#94A3B8" opacity=".9"/>
  </symbol>
</svg>

<!-- LOGIN -->
<div id="loginWrap" class="login-wrap">
  <div class="login-logo-area">
    <div class="login-logo-box">
      <svg width="56" height="56" viewBox="0 0 100 100">
        <text x="8" y="72" font-family="Arial Black,sans-serif" font-weight="900" font-size="68" fill="white">JB</text>
        <polygon points="52,6 64,6 64,18 52,18" fill="#EF4444"/>
        <polygon points="60,2 72,2 72,14 60,14" fill="#94A3B8"/>
      </svg>
    </div>
    <div class="login-title">JAYA BERKAH</div>
    <div class="login-sub">Integrated System · UD. Jaya Berkah, Kudus</div>
  </div>
  <div class="login-card">
    <div class="login-card-title">Masuk ke Sistem</div>
    <div class="field">
      <label class="field-label">Username <span class="req">*</span></label>
      <input id="lu" class="inp" placeholder="Masukkan username" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="field">
      <label class="field-label">Password <span class="req">*</span></label>
      <div class="pw-wrap">
        <input id="lp" type="password" class="inp" placeholder="Masukkan password" style="padding-right:46px" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="pw-eye" onclick="document.getElementById('lp').type=document.getElementById('lp').type==='password'?'text':'password'"></button>
      </div>
    </div>
    <div id="lerr" class="login-err">⚠ Username atau password salah</div>
    <button class="btn btn-blue btn-full" onclick="doLogin()">Masuk →</button>
    <div class="demo-section">
      <div class="demo-label">AKUN DEMO — TAP UNTUK PILIH</div>
      <div class="demo-grid">
        <div class="demo-btn" onclick="fillD('owner','jaya2025')"><div class="demo-av" style="background:#2563EB">B</div><div class="demo-u">owner</div><div class="demo-r"> Owner</div></div>
        <div class="demo-btn" onclick="fillD('admin','admin123')"><div class="demo-av" style="background:#7C3AED">A</div><div class="demo-u">admin</div><div class="demo-r"> Admin</div></div>
        <div class="demo-btn" onclick="fillD('paving','paving123')"><div class="demo-av" style="background:#059669">P</div><div class="demo-u">paving</div><div class="demo-r"> Paving</div></div>
        <div class="demo-btn" onclick="fillD('buis','buis123')"><div class="demo-av" style="background:#D97706">U</div><div class="demo-u">buis</div><div class="demo-r"> Buis</div></div>
        <div class="demo-btn" onclick="fillD('security','sec123')"><div class="demo-av" style="background:#475569">S</div><div class="demo-u">security</div><div class="demo-r"> Gate</div></div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appWrap" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="topbar">
    <div class="topbar-left">
      <svg class="jb-logo" viewBox="0 0 100 100">
        <rect width="100" height="100" rx="16" fill="rgba(255,255,255,.15)"/>
        <text x="6" y="72" font-family="Arial Black,sans-serif" font-weight="900" font-size="64" fill="white">JB</text>
        <polygon points="50,6 62,6 62,18 50,18" fill="#EF4444"/>
        <polygon points="58,2 70,2 70,14 58,14" fill="#94A3B8"/>
      </svg>
      <div class="topbar-title"><strong>JAYA BERKAH</strong><span>INTEGRATED SYSTEM</span></div>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="topAv">B</div>
        <div class="user-name" id="topName">-</div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </div>
  <div class="content" id="mc"></div>
  <div class="bottom-nav" id="bn"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>

function getRekapData(mesinId){
  var selWeek=gajiWeek||getWeekRange(null);
  var allProd=[...prodPav,...prodBuis].filter(function(p){
    return p.mesinId===mesinId && isInWeek(p.date,selWeek);
  });
  var mesinNama=allProd.length>0?allProd[0].mesinNama:mesinId;
  var days=["Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  var dates=[];
  for(var i=0;i<6;i++){
    var d=new Date(selWeek.senin);d.setDate(d.getDate()+i);
    dates.push(d.toISOString().slice(0,10));
  }
  return {selWeek,allProd,mesinNama,days,dates};
}

function shareWA(el){
  var mesinId=el.dataset?el.dataset.id:el;var mesinNama=el.dataset?el.dataset.nm:arguments[1];
  var selWeek=gajiWeek||getWeekRange(null);
  var allProd=[...prodPav,...prodBuis].filter(function(p){
    return p.mesinId===mesinId && isInWeek(p.date,selWeek);
  });
  var days=["Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  var dates=[];
  for(var i=0;i<6;i++){
    var d=new Date(selWeek.senin);d.setDate(d.getDate()+i);
    dates.push({label:days[i],date:d.toISOString().slice(0,10)});
  }
  var totGaji=allProd.reduce(function(a,b){return a+(b.total||0);},0);
  var totTunjangan=allProd.reduce(function(a,b){return a+(b.uangMakan||0)+(b.gantiCetakan||0)+(b.lainLain||0);},0);
  var totBon=allProd.reduce(function(a,b){return a+(b.bon||0);},0);
  var totNet=totGaji+totTunjangan-totBon;
  var NL="\n";
  var SEP="--------------------";
  var lines=[];
  lines.push("*SLIP GAJI MINGGUAN*");
  lines.push("UD. Jaya Berkah - Kudus");
  lines.push(SEP);
  lines.push("Nama    : *"+mesinNama+"*");
  lines.push("Periode : "+getWeekLabel(selWeek));
  lines.push(SEP);
  dates.forEach(function(day){
    var dp=allProd.filter(function(p){return p.date===day.date;});
    if(dp.length===0){lines.push("_"+day.label+": Libur_");return;}
    dp.forEach(function(p){
      var g=p.total||0,mk=p.uangMakan||0,ct=p.gantiCetakan||0,ll=p.lainLain||0,bn=p.bon||0;
      lines.push(day.label+": "+p.jml.toLocaleString("id-ID")+" biji "+p.nama.slice(0,15));
      lines.push("  Gaji: Rp "+g.toLocaleString("id-ID"));
      if(mk||ct||ll) lines.push("  Tunjangan: +Rp "+(mk+ct+ll).toLocaleString("id-ID"));
      if(bn) lines.push("  BON: -Rp "+bn.toLocaleString("id-ID"));
    });
  });
  lines.push(SEP);
  lines.push("Gaji Produksi : Rp "+totGaji.toLocaleString("id-ID"));
  if(totTunjangan) lines.push("Tunjangan     : +Rp "+totTunjangan.toLocaleString("id-ID"));
  if(totBon) lines.push("BON           : -Rp "+totBon.toLocaleString("id-ID"));
  lines.push(SEP);
  lines.push("*NET GAJI: Rp "+totNet.toLocaleString("id-ID")+"*");
  lines.push(SEP);
  lines.push("_Dikirim via JBIS - UD. Jaya Berkah_");
  var msg=lines.join(NL);
  var url="https://wa.me/?text="+encodeURIComponent(msg);
  window.open(url,"_blank");
  closeModalForce();
}

function updPavCalc(){
  const pid=document.getElementById("pPid")?.value;
  const mesinId=document.getElementById("pMesin")?.value;
  const jml=+document.getElementById("pJml")?.value||0;
  const prod=PAVING.find(p=>p.id===pid);
  const mesin=mesinList.find(m=>m.id===mesinId);
  if(jml>0){
    document.getElementById("pConv").style.display="block";
    document.getElementById("pBijiD").textContent=N(jml);
    if(prod){
      document.getElementById("pM2D").textContent=(prod.m2*jml).toFixed(2);
      document.getElementById("pM2Note").textContent=`1 biji = ${prod.m2} m² · ${prod.nama} · ${N(Math.round(1/prod.m2))} biji/m²`;
      document.getElementById("pM2Note").style.color="var(--text3)";
    } else {
      document.getElementById("pM2D").textContent="—";
      document.getElementById("pM2Note").textContent="← Pilih produk untuk lihat m²";
      document.getElementById("pM2Note").style.color="var(--yellow)";
    }
  } else {
    document.getElementById("pConv").style.display="none";
  }
  if(!prod||!mesin||!jml){document.getElementById("pCost").style.display="none";return;}
  document.getElementById("pCost").style.display="block";
  const ct=mesin.tarif*jml;
  const cb=calcCostPav(pid,jml);
  document.getElementById("pCT").textContent=Rp(ct);
  document.getElementById("pCB").textContent=cb?Rp(cb):"Belum ada formula";
  document.getElementById("pCB").style.color=cb?"var(--text)":"var(--text3)";
  document.getElementById("pTotal").textContent=Rp(ct+(cb||0));
}
function savePaving(){
  const pid=document.getElementById("pPid").value;
  const mesinId=document.getElementById("pMesin").value;
  const jml=+document.getElementById("pJml").value;
  const date=document.getElementById("pDate").value;
  const cat=document.getElementById("pCat").value;
  const uangMakan=+document.getElementById("pUangMakan").value||0;
  const gantiCetakan=+document.getElementById("pGantiCetakan").value||0;
  const lainLain=+document.getElementById("pLainLain").value||0;
  const bon=+document.getElementById("pBon").value||0;
  if(!pid||!mesinId||!jml){alert("Isi mesin, produk, dan jumlah dulu");return;}
  const prod=PAVING.find(p=>p.id===pid);
  const mesin=mesinList.find(m=>m.id===mesinId);
  const cb=calcCostPav(pid,jml);
  const ct=mesin.tarif*jml;
  const totalBersih=(ct+(cb||0))+uangMakan+gantiCetakan+lainLain-bon;
  prodPav.unshift({
    id:Date.now(),date,pid,nama:prod.nama,mesinId,mesinNama:mesin.nama,
    jml,m2:+(prod.m2*jml).toFixed(2),tenaga:mesin.tarif,
    total:ct+(cb||0),uangMakan,gantiCetakan,lainLain,bon,totalBersih,cat
  });
  addLog("Input Produksi Paving",`${prod.nama} — ${mesin.nama} — ${N(jml)} biji — ${Rp(ct+(cb||0))} + tunjangan ${Rp(uangMakan+gantiCetakan+lainLain)} - bon ${Rp(bon)}`,"prod");
  const t=document.getElementById("toastP");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3500);
  document.getElementById("pPid").value="";document.getElementById("pMesin").value="";
  document.getElementById("pJml").value="";document.getElementById("pCat").value="";
  document.getElementById("pUangMakan").value="0";document.getElementById("pGantiCetakan").value="0";
  document.getElementById("pLainLain").value="0";document.getElementById("pBon").value="0";
  document.getElementById("pConv").style.display="none";document.getElementById("pCost").style.display="none";
  syncToGS("paving",{pid,nama:prod.nama,jml,m2:+(prod.m2*jml).toFixed(3),date,mesinNama:mesin.nama});
}

function pgRiwayat(type){
  rwType=type;
  var data=type==="paving"?prodPav:prodBuis;
  var filt=rwFilter?data.filter(function(p){return p.date===rwFilter;}):data;
  var tB=filt.reduce(function(a,b){return a+b.jml;},0);
  var tM2=type==="paving"?filt.reduce(function(a,b){return a+(b.m2||0);},0):0;
  var tC=filt.reduce(function(a,b){return a+b.total;},0);
  var header='<div class="sec"><div class="sec-row"><div class="sec-dot"></div>'
    +'<div class="sec-title">Riwayat '+(type==="paving"?"Paving":"Buis Beton")+'</div></div></div>'
    +'<input type="date" class="inp" style="margin-bottom:14px" onchange="rwFilter=this.value;go(NAV)" value="'+rwFilter+'">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr'+(type==="paving"?" 1fr":"")+';gap:10px;margin-bottom:14px">'
    +'<div class="kpi"><div class="kpi-label">TOTAL BIJI</div><div class="kpi-val" style="color:#2563EB">'+N(tB)+'</div></div>'
    +(type==="paving"?'<div class="kpi"><div class="kpi-label">TOTAL M²</div><div class="kpi-val" style="color:#22C55E">'+tM2.toFixed(1)+'</div></div>':"")
    +'<div class="kpi"><div class="kpi-label">TOTAL COST</div><div class="kpi-val" style="color:#F97316;font-size:16px">'+Rp(tC)+'</div></div>'
    +'</div>';
  var items=filt.length===0
    ?'<div class="empty"><div style="font-size:40px;margin-bottom:8px">📦</div><div style="font-size:15px;font-weight:600;color:#475569">Belum ada data</div></div>'
    :filt.map(function(p){
      return '<div class="rw-card" style="border-left:3px solid #2563EB">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
        +'<div><div style="font-weight:700;font-size:14px">'+p.nama+'</div>'
        +'<div style="font-size:11px;color:#94A3B8">'+p.mesinNama+' · '+p.date+'</div></div>'
        +'<div style="text-align:right"><div style="font-weight:700;color:#2563EB">'+N(p.jml)+' biji</div>'
        +(type==="paving"?'<div style="font-size:11px;color:#22C55E">'+(p.m2||0).toFixed(2)+' m²</div>':'')
        +'</div></div>'
        +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<div style="font-size:12px;color:#F97316;font-weight:600">Cost: '+Rp(p.total)+'</div>'
        +'<div style="display:flex;gap:6px">'
        +'<button onclick="openEditRw(this)" data-type="'+type+'" data-id="'+p.id+'" style="border:1.5px solid #E2E8F0;background:#F8FAFC;color:#475569;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer">Edit</button>'
        +'<button onclick="hapusRw(this)" data-type="'+type+'" data-id="'+p.id+'" style="border:none;background:#FEE2E2;color:#DC2626;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer">Hapus</button>'
        +'</div></div>'
        +(p.cat?'<div style="font-size:11px;color:#94A3B8;font-style:italic;margin-top:4px">'+p.cat+'</div>':'')
        +'</div>';
    }).join('');
  return header+items;
}

function pgGaji(){
  var allData=[...prodPav,...prodBuis];
  var weeks=getUniqueWeeks(allData);
  if(weeks.length===0){
    return '<div class="sec"><div class="sec-row"><div class="sec-dot"></div><div class="sec-title">Penggajian Mingguan</div></div></div>'
      +'<div class="empty"><div style="font-size:40px;margin-bottom:8px">💰</div>'
      +'<div style="font-size:15px;font-weight:600;color:#475569">Belum ada data produksi</div></div>';
  }
  var selWeek=gajiWeek||weeks[0];
  gajiWeek=selWeek; // always sync
  var weekOpts=weeks.map(function(w){
    return '<option value="'+w.senin+'"'+(selWeek.senin===w.senin?' selected':'')+'>'+getWeekLabel(w)+'</option>';
  }).join('');
  var rekapPav=rekapMesinWeek(prodPav,selWeek);
  var rekapBuis=rekapMesinWeek(prodBuis,selWeek);
  var allRekap=[...rekapPav,...rekapBuis];
  var totalNet=allRekap.reduce(function(a,b){return a+b.totalBersih;},0);

  var kartu=allRekap.map(function(m){
    var stat=gajiStatus[selWeek.senin+'_'+m.mesinId]||'belum';
    var statStyle=stat==='sesuai'
      ?'background:#DCFCE7;color:#15803D;border:1.5px solid #86EFAC;'
      :'background:#FEF3C7;color:#92400E;border:1.5px solid #FCD34D;';
    return '<div id="gaji-card-'+m.mesinId+'" class="card" style="margin-bottom:10px;border-left:4px solid '+(stat==="sesuai"?'#16A34A':'#E2E8F0')+';transition:all .3s">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
      +'<div><div style="font-weight:700;font-size:15px">'+m.mesinNama+'</div>'
      +'<div style="font-size:11px;color:#94A3B8">'+m.totalProd.toLocaleString("id-ID")+' biji</div></div>'
      +'<div style="text-align:right"><div style="font-weight:800;font-size:18px;color:#F97316">'+Rp(m.totalBersih)+'</div>'
      +(stat==='sesuai'?'<span style="background:#DCFCE7;color:#15803D;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700">&#10003; Terkonfirmasi</span>':'')+'</div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">'
      +'<div style="background:#EFF6FF;border-radius:8px;padding:8px;text-align:center">'
      +'<div style="font-size:10px;color:#94A3B8">Gaji Produksi</div>'
      +'<div style="font-weight:700;color:#2563EB;font-size:12px">'+Rp(m.totalCost)+'</div></div>'
      +'<div style="background:#F0FDF4;border-radius:8px;padding:8px;text-align:center">'
      +'<div style="font-size:10px;color:#94A3B8">Tunjangan</div>'
      +'<div style="font-weight:700;color:#15803D;font-size:12px">+'+Rp(m.totalMakan+m.totalCetakan+m.totalLain)+'</div></div>'
      +'<div style="background:#FEF2F2;border-radius:8px;padding:8px;text-align:center">'
      +'<div style="font-size:10px;color:#94A3B8">BON</div>'
      +'<div style="font-weight:700;color:#DC2626;font-size:12px">-'+Rp(m.totalBon)+'</div></div>'
      +'</div>'
      // Action buttons
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'
      +'<button onclick="showDetailGaji(this)" data-id="'+m.mesinId+'" data-nm="'+m.mesinNama+'" '
      +'style="background:#EFF6FF;color:#2563EB;border:1.5px solid #BFDBFE;border-radius:10px;padding:9px;font-size:12px;font-weight:600;cursor:pointer">Rincian &amp; Export</button>'
      +'<button onclick="konfirmasiGaji(this)" data-id="'+m.mesinId+'" data-nm="'+m.mesinNama+'" data-week="'+selWeek.senin+'" '
      +'style="border:none;border-radius:10px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;'
      +(stat==='sesuai'?'background:#16A34A;color:#fff;':'background:#FEF3C7;color:#92400E;border:1.5px solid #FCD34D;')
      +'">'+(stat==='sesuai'?'&#10003; Confirmed':'Konfirmasi Sesuai')+'</button>'
      +'</div>'
      +'</div>';
  }).join('');

  return '<div class="sec"><div class="sec-row"><div class="sec-dot"></div><div class="sec-title">Penggajian Mingguan</div></div></div>'
    +'<div class="field" style="margin-bottom:14px">'

    +'<div style="background:linear-gradient(135deg,#1D4ED8,#3B82F6);border-radius:16px;padding:16px;text-align:center;margin-bottom:14px;color:#fff">'
    +'<div style="font-size:11px;opacity:.7;margin-bottom:4px">TOTAL GAJI MINGGU '+getWeekLabel(selWeek).toUpperCase()+'</div>'
    +'<div style="font-size:28px;font-weight:900">'+Rp(totalNet)+'</div>'
    +'<div style="font-size:11px;opacity:.7;margin-top:4px">'+allRekap.length+' mesin/pembuat aktif</div>'
    +'<div style="display:flex;gap:8px;justify-content:center;margin-top:12px">'
    +'<button onclick="exportAllCSV()" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:10px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer">CSV Semua</button>'

    +'</div></div>'
    +(allRekap.length===0
      ?'<div class="empty"><div style="font-size:36px;margin-bottom:8px">📅</div><div style="font-size:14px;font-weight:600;color:#475569">Tidak ada produksi minggu ini</div></div>'
      :kartu
    );
}

function showDetailGaji(el){
  var mesinId=el.dataset?el.dataset.id:el;var mesinNama=el.dataset?el.dataset.nm:arguments[1];
  var selWeek=gajiWeek||getWeekRange(null);
  var days=["Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  var dates=[];
  for(var i=0;i<6;i++){
    var d=new Date(selWeek.senin);
    d.setDate(d.getDate()+i);
    dates.push(d.toISOString().slice(0,10));
  }
  var allProd=[...prodPav,...prodBuis].filter(function(p){
    return p.mesinId===mesinId && isInWeek(p.date,selWeek);
  });
  var totalGaji=allProd.reduce(function(a,b){return a+(b.total||0);},0);
  var totalMakan=allProd.reduce(function(a,b){return a+(b.uangMakan||0);},0);
  var totalCetakan=allProd.reduce(function(a,b){return a+(b.gantiCetakan||0);},0);
  var totalLain=allProd.reduce(function(a,b){return a+(b.lainLain||0);},0);
  var totalTunjangan=totalMakan+totalCetakan+totalLain;
  var totalBon=allProd.reduce(function(a,b){return a+(b.bon||0);},0);
  var totalNet=totalGaji+totalTunjangan-totalBon;

  var rows=dates.map(function(date,i){
    var dayProds=allProd.filter(function(p){return p.date===date;});
    if(dayProds.length===0){
      return '<tr style="color:#94A3B8"><td style="padding:7px 6px;font-size:11px">'+days[i]+'<br><small>'+date.slice(5)+'</small></td>'
        +'<td style="padding:7px 6px;font-size:11px;text-align:center">—</td>'
        +'<td colspan="4" style="padding:7px 6px;font-size:11px;text-align:center">Libur/Tidak Produksi</td></tr>';
    }
    var gaji=dayProds.reduce(function(a,b){return a+(b.total||0);},0);
    var makan=dayProds.reduce(function(a,b){return a+(b.uangMakan||0);},0);
    var cetakan=dayProds.reduce(function(a,b){return a+(b.gantiCetakan||0);},0);
    var lain=dayProds.reduce(function(a,b){return a+(b.lainLain||0);},0);
    var bon=dayProds.reduce(function(a,b){return a+(b.bon||0);},0);
    var net=gaji+makan+cetakan+lain-bon;
    var prodNames=dayProds.map(function(p){
      return p.jml.toLocaleString("id-ID")+" biji "+p.nama.replace("Paving ","").replace("Buis Beton ","");
    }).join("<br>");
    return '<tr style="border-top:1px solid #F1F5F9">'
      +'<td style="padding:7px 6px;font-size:11px;font-weight:600">'+days[i]+'<br><small style="color:#94A3B8">'+date.slice(5)+'</small></td>'
      +'<td style="padding:7px 6px;font-size:10px;color:#475569">'+prodNames+'</td>'
      +'<td style="padding:7px 6px;font-size:11px;text-align:right;color:#2563EB">'+Rp(gaji)+'</td>'
      +'<td style="padding:7px 6px;font-size:11px;text-align:right;color:#15803D">'+Rp(makan+cetakan+lain)+'</td>'
      +'<td style="padding:7px 6px;font-size:11px;text-align:right;color:#DC2626">'+(bon>0?'-'+Rp(bon):'—')+'</td>'
      +'<td style="padding:7px 6px;font-size:11px;text-align:right;font-weight:700;color:#F97316">'+Rp(net)+'</td>'
      +'</tr>';
  }).join('');

  var stat=gajiStatus[selWeek.senin+'_'+mesinId]||'belum';
  var statBadge=stat==='sesuai'
    ?'<span style="background:#DCFCE7;color:#15803D;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700">&#10003; Terkonfirmasi</span>'
    :'<span style="background:#FEF9C3;color:#92400E;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700">Belum Dikonfirmasi</span>';

  var h='<div class="modal-title">Slip Gaji — '+mesinNama+'</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    +'<div style="font-size:11px;color:#94A3B8">'+getWeekLabel(selWeek)+'</div>'
    +statBadge+'</div>'
    // Tabel rincian
    +'<div style="overflow-x:auto;margin-bottom:12px">'
    +'<table style="width:100%;border-collapse:collapse;min-width:360px">'
    +'<thead><tr style="background:#F8FAFC">'
    +'<th style="padding:7px 6px;text-align:left;font-size:10px;color:#94A3B8;font-weight:600">Hari</th>'
    +'<th style="padding:7px 6px;text-align:left;font-size:10px;color:#94A3B8;font-weight:600">Produksi</th>'
    +'<th style="padding:7px 6px;text-align:right;font-size:10px;color:#94A3B8;font-weight:600">Gaji</th>'
    +'<th style="padding:7px 6px;text-align:right;font-size:10px;color:#94A3B8;font-weight:600">Tunjangan</th>'
    +'<th style="padding:7px 6px;text-align:right;font-size:10px;color:#94A3B8;font-weight:600">BON</th>'
    +'<th style="padding:7px 6px;text-align:right;font-size:10px;color:#94A3B8;font-weight:600">Net</th>'
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'<tfoot><tr style="background:#FFF7ED;border-top:2px solid #F97316">'
    +'<td colspan="2" style="padding:8px 6px;font-weight:700;font-size:12px">TOTAL</td>'
    +'<td style="padding:8px 6px;text-align:right;font-weight:700;color:#2563EB;font-size:12px">'+Rp(totalGaji)+'</td>'
    +'<td style="padding:8px 6px;text-align:right;font-weight:700;color:#15803D;font-size:12px">'+Rp(totalTunjangan)+'</td>'
    +'<td style="padding:8px 6px;text-align:right;font-weight:700;color:#DC2626;font-size:12px">'+(totalBon>0?'-'+Rp(totalBon):'—')+'</td>'
    +'<td style="padding:8px 6px;text-align:right;font-weight:900;font-size:16px;color:#F97316">'+Rp(totalNet)+'</td>'
    +'</tr></tfoot></table></div>'
    // Rincian tunjangan
    +(totalMakan||totalCetakan||totalLain
      ?'<div style="background:#F0FDF4;border-radius:10px;padding:10px;margin-bottom:12px;font-size:11px">'
       +'<div style="font-weight:700;color:#15803D;margin-bottom:6px">Rincian Tunjangan:</div>'
       +(totalMakan?'<div style="display:flex;justify-content:space-between"><span>Uang Makan</span><span>'+Rp(totalMakan)+'</span></div>':'')
       +(totalCetakan?'<div style="display:flex;justify-content:space-between"><span>Ganti Cetakan</span><span>'+Rp(totalCetakan)+'</span></div>':'')
       +(totalLain?'<div style="display:flex;justify-content:space-between"><span>Biaya Lain-lain</span><span>'+Rp(totalLain)+'</span></div>':'')
       +(totalBon?'<div style="display:flex;justify-content:space-between;color:#DC2626"><span>BON (Potongan)</span><span>-'+Rp(totalBon)+'</span></div>':'')
       +'</div>':''
    )
    // Action buttons
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'
    +'<button onclick="konfirmasiGaji(this)" data-id="'+mesinId+'" data-nm="'+mesinNama+'" '
    +'style="border:none;border-radius:10px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;'
    +(stat==='sesuai'?'background:#16A34A;color:#fff;':'background:#FEF3C7;color:#92400E;border:1.5px solid #FCD34D;')
    +'">'
    +(stat==='sesuai'?'&#10003; Confirmed - Batalkan':'Konfirmasi Sesuai')+'</button>'
    +'<button onclick="exportCSV(this)" data-id="'+mesinId+'" data-nm="'+mesinNama+'" '
    +'style="background:#F0FDF4;color:#15803D;border:1.5px solid #BBF7D0;border-radius:10px;padding:10px;font-size:12px;font-weight:700;cursor:pointer">Export CSV</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'
    +'<button onclick="printSlipGaji(this)" data-id="'+mesinId+'" data-nm="'+mesinNama+'" '
    +'style="background:#FFF7ED;color:#C2410C;border:1.5px solid #FED7AA;border-radius:10px;padding:10px;font-size:12px;font-weight:700;cursor:pointer">Print Slip Gaji</button>'
    +'<button onclick="shareWA(this)" data-id="'+mesinId+'" data-nm="'+mesinNama+'" '

    +'</div>'
    +'<button class="btn btn-ghost btn-full" onclick="closeModalForce()">Tutup</button>';
  openModal(h);
}

function setMesinStatus(id,s){
  mesinList=mesinList.map(m=>m.id===id?{...m,gajiStatus:s}:m);
  const m=mesinList.find(x=>x.id===id);
  addLog("Update Gaji Mesin",`${m.nama} — ${s} — ${Rp(m.gajiStatus==="lunas"?[...prodPav,...prodBuis].filter(p=>p.mesinId===id).reduce((a,b)=>a+b.total,0):0)}`,"gaji");
  go("gaji");
}
function allMesinLunas(){mesinList=mesinList.map(m=>({...m,gajiStatus:"lunas"}));addLog("Semua Mesin Lunas","Semua mesin ditandai lunas","gaji");go("gaji");}
function copyGaji(){
  const rows=mesinList.filter(m=>{
    const p=[...prodPav,...prodBuis].filter(x=>x.mesinId===m.id);
    return p.length>0;
  }).map(m=>{
    const p=[...prodPav,...prodBuis].filter(x=>x.mesinId===m.id);
    const total=p.reduce((a,b)=>a+b.total,0);
    const biji=p.reduce((a,b)=>a+b.jml,0);
    return`${m.nama}\t${m.operator}\t${N(biji)} biji\t${Rp(m.tarif)}/biji\t${Rp(total)}\t${m.gajiStatus||"belum"}`;
  }).join("\
");
  const text=`PENGGAJIAN PER MESIN - UD. JAYA BERKAH\
Tanggal: ${new Date().toLocaleDateString("id-ID")}\
\
Mesin\tOperator\tTotal Biji\tTarif\tTotal Gaji\tStatus\
${rows}`;
  navigator.clipboard.writeText(text).then(()=>{
    const b=document.getElementById("btnCopy");
    if(b){b.textContent="✅ Tersalin!";b.style.background="var(--green)";setTimeout(()=>{b.textContent=" Copy Accurate";b.style.background="";},2500);}
  }).catch(()=>alert("Salin manual"));
}

        <div class="hpp-col hi"><div class="hpp-col-label">HPP/biji</div><div class="hpp-col-val">${Rp(p.tenaga+cb)}</div></div>

  const buisList=BUIS.map(b=>{

      <div class="hpp-cols">
        <div class="hpp-col"><div class="hpp-col-label">Biaya Tenaga</div><div class="hpp-col-val">${Rp(b.tenaga)}</div></div>
        <div class="hpp-col hi"><div class="hpp-col-label">HPP min/biji</div><div class="hpp-col-val">${Rp(b.tenaga+cb)}</div></div>

    </div>`;}).join("");

  return`

  openModal(`

          <div><div style="color:var(--text3);font-size:10px;margin-bottom:4px">Jumlah</div><input type="number" step="0.1" id="${fk}" value="${fv}" class="inp" style="padding:11px 12px" oninput="updFMCost('${pid}')"/></div>

    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-blue" style="flex:1" onclick="saveFM('${pid}')"> Simpan</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModalForce()">Batal</button>

function updFMCost(pid){
  try{
    const isPav=pid.startsWith("P");
    const s=+document.getElementById("x_s").value||0,hs=+document.getElementById("x_hs").value||0;
    const p=+document.getElementById("x_p").value||0,hp=+document.getElementById("x_hp").value||0;
    let cost;
    if(isPav){
      const a=+document.getElementById("x_a").value||0,ha=+document.getElementById("x_ha").value||0;
      const air=+document.getElementById("x_air").value||0,hair=+document.getElementById("x_hair").value||0;
      const add=+document.getElementById("x_add").value||0,hadd=+document.getElementById("x_hadd").value||0;
      cost=Math.round((s*hs+p*hp+a*ha+air*hair+add*hadd)/100);
    }else{
      const k=+document.getElementById("x_k").value||0,hk=+document.getElementById("x_hk").value||0;
      const air=+document.getElementById("x_air").value||0,hair=+document.getElementById("x_hair").value||0;
      const besi=+document.getElementById("x_besi").value||0,hb=+document.getElementById("x_hb").value||0;
      cost=Math.round(s*hs+p*hp+k*hk+air*hair+besi*hb);
    }
    const d=document.getElementById("fmCD");if(d)d.textContent=Rp(cost);
  }catch(e){}
}
function saveFM(pid){
  const isPav=pid.startsWith("P");
  if(isPav){
    formula[pid]={semen:+document.getElementById("x_s").value||0,hs:+document.getElementById("x_hs").value||0,pasir:+document.getElementById("x_p").value||0,hp:+document.getElementById("x_hp").value||0,abu:+document.getElementById("x_a").value||0,ha:+document.getElementById("x_ha").value||0,air:+document.getElementById("x_air").value||0,hair:+document.getElementById("x_hair").value||0,add:+document.getElementById("x_add").value||0,hadd:+document.getElementById("x_hadd").value||0};
  }else{
    formula[pid]={semen:+document.getElementById("x_s").value||0,hs:+document.getElementById("x_hs").value||0,pasir:+document.getElementById("x_p").value||0,hp:+document.getElementById("x_hp").value||0,krosok:+document.getElementById("x_k").value||0,hk:+document.getElementById("x_hk").value||0,air:+document.getElementById("x_air").value||0,hair:+document.getElementById("x_hair").value||0,besi:+document.getElementById("x_besi").value||0,hb:+document.getElementById("x_hb").value||0};
  }
  const prod=isPav?PAVING.find(p=>p.id===pid):BUIS.find(p=>p.id===pid);
  addLog("Update Formula",`${prod?.nama}`,"mesin");
  closeModalForce();go("formula_m");
}

function autoFillPlat(sel){
  var nama=sel.value;
  var sopir=masterSopir.find(function(s){return s.nama===nama;});
  var platEl=document.getElementById("sPlat");
  var jenisEl=document.getElementById("sJenis");
  if(sopir&&sopir.plat&&platEl){
    platEl.value=sopir.plat;
    if(jenisEl&&sopir.jenis&&jenisEl.options&&jenisEl.options.length){
      for(var i=0;i<jenisEl.options.length;i++){
        if(jenisEl.options[i].text===sopir.jenis){jenisEl.selectedIndex=i;break;}
      }
    }
  } else if(platEl){
    platEl.value="";
  }
}

function saveLog(){
  var sopirVal=document.getElementById("sSopir").value;
  var platVal=document.getElementById("sPlat").value.trim();
  if(!sopirVal||!platVal){alert("Isi sopir dan plat nomor dulu");return;}
  var now=new Date();
  var jumlahVal=parseFloat(document.getElementById("sJumlah").value)||0;
  var muatanVal=document.getElementById("sMuatan").value.trim();
  var jenisVal=document.getElementById("sJenis").value;
  var tujuanVal=document.getElementById("sTujuan").value.trim();
  var spellBijiVal=0,spellJenisVal="";
  if(_secArah==="keluar"){
    var sbEl=document.getElementById("sSpellBiji");
    var sjEl=document.getElementById("sSpellJenis");
    if(sbEl)spellBijiVal=parseInt(sbEl.value)||0;
    if(sjEl)spellJenisVal=sjEl.value;
  }
  var entry={
    id:Date.now(),tgl:todayS(),
    waktu:now.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"}),
    sopir:sopirVal,plat:platVal,jenis:jenisVal,arah:_secArah,
    muatan:muatanVal,jumlah:jumlahVal,satuan:_secSatuan,
    tujuan:tujuanVal,spellBiji:spellBijiVal,spellJenis:spellJenisVal
  };
  secLog.unshift(entry);
  var detail=platVal+" ("+jenisVal+") \u2014 "+sopirVal
    +(muatanVal?" \u2014 "+muatanVal+(jumlahVal?" "+jumlahVal+" "+_secSatuan:""):"")
    +(spellBijiVal?" | Spell: "+N(spellBijiVal)+" pcs"+(spellJenisVal?" "+spellJenisVal:""):"");
  addLog("Kendaraan "+_secArah,detail,"gate");
  var t=document.getElementById("toastSec");
  if(t){t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
  go("security");
}

  gsConfig={url:url,aktif:true};
  try{localStorage.setItem("jb_gs",JSON.stringify(gsConfig));}catch(e){}

function resetGsConfig(){

async function testGsConfig(){
  var url=document.getElementById("gsUrl").value.trim();
  if(!url){alert("Isi URL dulu");return;}
  var st=document.getElementById("gsStatus");
  st.textContent="Testing...";st.style.background="#FEF3C7";st.style.color="#92400E";
  try{
    await fetch(url,{method:"GET",mode:"cors"});
    st.textContent="Koneksi OK!";st.style.background="#DCFCE7";st.style.color="#15803D";
  }catch(e){
    try{await fetch(url,{method:"GET",mode:"no-cors"});
      st.textContent="Terkirim (no-cors)";st.style.background="#DCFCE7";st.style.color="#15803D";
    }catch(e2){
      st.textContent="Gagal: "+e2.message;st.style.background="#FEE2E2";st.style.color="#DC2626";
    }
  }
}
async function syncToGS(type,payload){
  if(!gsConfig.aktif||!gsConfig.url)return;
  try{
    var params=new URLSearchParams();
    params.append("type",type);
    Object.entries(payload).forEach(function(kv){params.append(kv[0],String(kv[1]));});
    var url=gsConfig.url+"?"+params.toString();
    var r=await fetch(url,{method:"GET",mode:"cors"});
    if(r.ok){var d=await r.json();console.log("GS Sync:",d.message||d.status);}
  }catch(e){
    try{
      var params2=new URLSearchParams();
      params2.append("type",type);
      Object.entries(payload).forEach(function(kv){params2.append(kv[0],String(kv[1]));});
      await fetch(gsConfig.url+"?"+params2.toString(),{method:"GET",mode:"no-cors"});
    }catch(e2){}
  }
}

// ── Helper minggu kerja (Senin-Sabtu) ──────────────────
function getWeekRange(dateStr){
  // Kembalikan {senin, sabtu} dari tanggal mana saja dalam minggu itu
  var d=dateStr?new Date(dateStr):new Date();
  var day=d.getDay(); // 0=Minggu,1=Senin,...,6=Sabtu
  // Jika Minggu, anggap masuk minggu berikutnya
  var diffToMon=day===0?1:(-(day-1));
  var mon=new Date(d);mon.setDate(d.getDate()+diffToMon);
  var sat=new Date(mon);sat.setDate(mon.getDate()+5);
  var fmt=function(x){return x.toISOString().slice(0,10);};
  return {senin:fmt(mon),sabtu:fmt(sat)};
}

function isInWeek(dateStr, weekRange){
  return dateStr>=weekRange.senin && dateStr<=weekRange.sabtu;
}

function getWeekLabel(weekRange){
  var opt={day:"numeric",month:"short"};
  var s=new Date(weekRange.senin).toLocaleDateString("id-ID",opt);
  var e=new Date(weekRange.sabtu).toLocaleDateString("id-ID",opt);
  return s+" – "+e;
}

// Ambil semua minggu unik dari data
function getUniqueWeeks(data){
  var weeks={};
  data.forEach(function(d){
    var w=getWeekRange(d.date);
    weeks[w.senin]=w;
  });
  return Object.values(weeks).sort(function(a,b){return b.senin.localeCompare(a.senin);});
}

// Rekap per mesin untuk satu minggu
function rekapMesinWeek(data, weekRange){
  var byMesin={};
  data.filter(function(d){return isInWeek(d.date,weekRange);}).forEach(function(d){
    if(!byMesin[d.mesinId]){
      byMesin[d.mesinId]={mesinId:d.mesinId,mesinNama:d.mesinNama,items:[],
        totalProd:0,totalCost:0,totalMakan:0,totalCetakan:0,totalLain:0,totalBon:0,totalBersih:0};
    }
    var m=byMesin[d.mesinId];
    m.items.push(d);
    m.totalProd+=d.jml;
    m.totalCost+=d.total||0;
    m.totalMakan+=(d.uangMakan||0);
    m.totalCetakan+=(d.gantiCetakan||0);
    m.totalLain+=(d.lainLain||0);
    m.totalBon+=(d.bon||0);
    m.totalBersih+=(d.totalBersih||(d.total||0));
  });
  return Object.values(byMesin);
}

// ── Export CSV per mesin ───────────────────────────────
function exportCSV(el){
  var mesinId=el.dataset?el.dataset.id:el;var mesinNama=el.dataset?el.dataset.nm:arguments[1];
  var selWeek=gajiWeek||getWeekRange(null);
  var days=["Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  var dates=[];
  for(var i=0;i<6;i++){
    var d=new Date(selWeek.senin);d.setDate(d.getDate()+i);
    dates.push({label:days[i],date:d.toISOString().slice(0,10)});
  }
  var allProd=[...prodPav,...prodBuis].filter(function(p){
    return p.mesinId===mesinId && isInWeek(p.date,selWeek);
  });
  var rows=[
    ['UD. Jaya Berkah - Slip Gaji Mingguan'],
    ['Mesin/Pembuat',mesinNama],
    ['Periode',getWeekLabel(selWeek)],
    [''],
    ['Hari','Tanggal','Produk','Jumlah (biji)','Gaji Produksi','Uang Makan','Ganti Cetakan','Biaya Lain','BON','Net Gaji']
  ];
  var totGaji=0,totMakan=0,totCetakan=0,totLain=0,totBon=0,totNet=0;
  dates.forEach(function(day){
    var dp=allProd.filter(function(p){return p.date===day.date;});
    if(dp.length===0){
      rows.push([day.label,day.date,'Libur','0','0','0','0','0','0','0']);
      return;
    }
    dp.forEach(function(p){
      var gaji=p.total||0,makan=p.uangMakan||0,cetakan=p.gantiCetakan||0;
      var lain=p.lainLain||0,bon=p.bon||0,net=gaji+makan+cetakan+lain-bon;
      rows.push([day.label,day.date,p.nama,p.jml,gaji,makan,cetakan,lain,bon,net]);
      totGaji+=gaji;totMakan+=makan;totCetakan+=cetakan;totLain+=lain;totBon+=bon;totNet+=net;
    });
  });
  rows.push(['']);
  rows.push(['TOTAL','','','',totGaji,totMakan,totCetakan,totLain,totBon,totNet]);
  var csv=rows.map(function(r){
    return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');
  }).join("\n");
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='SlipGaji_'+mesinNama.replace(/\s/g,'_')+'_'+selWeek.senin+'.csv';
  a.click();URL.revokeObjectURL(url);
  showToast('CSV '+mesinNama+' berhasil diunduh!');
}

        var g=p.total||0,mk=p.uangMakan||0,ct=p.gantiCetakan||0,ll=p.lainLain||0,bn=p.bon||0;
        return '<tr>'+(i===0?'<td rowspan="'+dp.length+'">'+day.label+'</td>':'')
          +'<td>'+p.nama.slice(0,20)+'<br><small>'+p.jml.toLocaleString('id-ID')+' biji</small></td>'
          +'<td class="r">'+g.toLocaleString('id-ID')+'</td>'
          +'<td class="r">'+((mk+ct+ll)>0?(mk+ct+ll).toLocaleString('id-ID'):'—')+'</td>'
          +'<td class="r">'+(bn>0?bn.toLocaleString('id-ID'):'—')+'</td>'
          +'<td class="r b">'+(g+mk+ct+ll-bn).toLocaleString('id-ID')+'</td></tr>';
      }).join('');
    }).join('');
    var net=m.totalBersih;
    return '<div class="slip">'
      +'<div class="logo"><div class="co">UD. JAYA BERKAH</div>'
      +'<div class="addr">Kudus, Jawa Tengah</div>'
      +'<div class="ttl">SLIP GAJI MINGGUAN</div></div>'
      +'<div class="meta"><div><b>Nama:</b> '+m.mesinNama+'</div><div><b>Periode:</b> '+getWeekLabel(selWeek)+'</div></div>'
      +'<table><thead><tr><th>Hari</th><th>Produk</th><th class="r">Gaji</th><th class="r">Tunjangan</th><th class="r">BON</th><th class="r">Net</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table>'
      +'<div class="net">NET GAJI: Rp '+net.toLocaleString('id-ID')+'</div>'
      +'<div class="sign"><div class="sb">Penerima<div class="sl">('+m.mesinNama+')</div></div>'
      +'<div class="sb">Mengetahui<div class="sl">(Mandor/Admin)</div></div></div>'
      +'</div>';
  }).join('<div style="page-break-after:always"></div>');

  var html2='<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Slip Gaji Semua</title>'
    +'<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Courier New",monospace;font-size:10px}'
    +'.slip{width:148mm;margin:0 auto;padding:8mm 10mm;page-break-inside:avoid}'
    +'.logo{text-align:center;border-bottom:2px solid #000;padding-bottom:5px;margin-bottom:6px}'
    +'.co{font-size:15px;font-weight:900}.addr{font-size:9px;color:#555}.ttl{font-size:12px;font-weight:700}'
    +'.meta{display:flex;justify-content:space-between;margin-bottom:6px;font-size:10px}'
    +'table{width:100%;border-collapse:collapse;margin-bottom:6px}th{background:#f5f5f5;border:1px solid #ccc;padding:3px 4px;font-size:9px}'
    +'td{border:1px solid #ddd;padding:3px 4px;font-size:9px;vertical-align:top}.r{text-align:right}.b{font-weight:700}'
    +'.net{text-align:center;font-size:16px;font-weight:900;border:2px solid #000;padding:6px;margin:6px 0}'
    +'.sign{display:flex;justify-content:space-between;margin-top:14px}'
    +'.sb{text-align:center;width:45%}.sl{border-top:1px solid #000;margin-top:20px;padding-top:3px;font-size:9px}'
    +'@media print{@page{size:A6 portrait;margin:5mm}body{font-size:9px}}'
    +'</style></head><body>'+slips
    +'<scr'+'ipt>window.onload=function(){window.print();};<\/sc'+'ript></body></html>';

  var w=window.open('','_blank','width=700,height=800');
  if(w){w.document.write(html2);w.document.close();}
}
